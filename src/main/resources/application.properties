# Carga .env desde la raíz del proyecto (sin plugin Maven; Spring Boot 2.4+)
spring.config.import=optional:file:.env[.properties]

spring.application.name=sistema-financiero
spring.datasource.url=jdbc:postgresql://localhost:5432/finanz_daroca
spring.datasource.username=admin_daroca
spring.datasource.password=${DB_PASSWORD:secret123}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# false (por defecto): schema.sql/data.sql ANTES de validar Hibernate.
# true rompe validate porque EMF arranca sin tablas creadas aún.
spring.jpa.defer-datasource-initialization=false

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
