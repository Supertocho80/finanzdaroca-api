services:
  postgres-db:
    image: postgres:15-alpine
    container_name: finanzas-db
    environment:
      POSTGRES_USER: admin_daroca
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: finanz_daroca
    ports:
      - "5432:5432"
    volumes:
      # Creamos el volumen dentro del proyecto
      - ./.postgres-data:/var/lib/postgresql/data